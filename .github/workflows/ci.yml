name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (Lint, Type Check, Build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @simualpha/web lint

      - name: Type check
        run: pnpm --filter @simualpha/web typecheck

      - name: Build
        run: pnpm --filter @simualpha/web build

  api:
    name: API (Lint, Type Check, Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install worker dependency
        run: pip install -e ../worker

      - name: Install API with dev deps
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: python -m pytest tests/ -x -q --tb=short

  worker:
    name: Worker (Lint, Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install worker with dev deps
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: python -m pytest tests/ -x -q --tb=short

  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t simualpha-api .

      - name: Build Worker image
        run: docker build -f apps/worker/Dockerfile -t simualpha-worker apps/worker
