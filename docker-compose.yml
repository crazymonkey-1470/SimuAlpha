version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: simualpha
      POSTGRES_PASSWORD: simualpha
      POSTGRES_DB: simualpha
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simualpha"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      SIMUALPHA_DATABASE_URL: postgresql://simualpha:simualpha@postgres:5432/simualpha
      SIMUALPHA_REDIS_URL: redis://redis:6379/0
      SIMUALPHA_JWT_SECRET: dev-secret-change-in-production
      SIMUALPHA_DEBUG: "false"
      SIMUALPHA_USE_REAL_DATA: "false"
      SIMUALPHA_CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: apps/worker
      dockerfile: Dockerfile
    environment:
      SIMUALPHA_DATABASE_URL: postgresql://simualpha:simualpha@postgres:5432/simualpha
      SIMUALPHA_REDIS_URL: redis://redis:6379/0
      SIMUALPHA_ENVIRONMENT: production
      SIMUALPHA_LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["python", "-m", "worker.main", "worker"]

  scheduler:
    build:
      context: apps/worker
      dockerfile: Dockerfile
    environment:
      SIMUALPHA_DATABASE_URL: postgresql://simualpha:simualpha@postgres:5432/simualpha
      SIMUALPHA_REDIS_URL: redis://redis:6379/0
      SIMUALPHA_ENVIRONMENT: production
      SIMUALPHA_LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["python", "-m", "worker.main", "scheduler"]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
