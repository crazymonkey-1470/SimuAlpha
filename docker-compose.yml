version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: simualpha
      POSTGRES_PASSWORD: simualpha
      POSTGRES_DB: simualpha
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simualpha"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
